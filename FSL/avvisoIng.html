<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avviso - Progetto Scolastico</title>
    <style>
        /* Variabili fornite da te */
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent: #0f3460;
            --highlight: #459fe9;
            --white: #ffffff;
            --gray-light: #f5f5f5;
            --gray: #888;
            --text: #333;
            --success: #28a745;
            --warning: #ffc107;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            background-color: var(--primary); /* Sfondo scuro dai tuoi colori */
        }

        .box { 
            background: var(--white); 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
            text-align: center; 
            max-width: 400px; 
            border-top: 5px solid var(--highlight); /* Linea estetica superiore */
        }

        h1 { 
            color: var(--secondary); 
            margin-bottom: 15px;
            font-size: 24px;
        }

        p { 
            color: var(--text); 
            line-height: 1.6; 
            font-size: 16px;
        }

        strong {
            color: var(--accent);
        }

        .btn { 
            display: inline-block; 
            margin-top: 25px; 
            padding: 12px 24px; 
            background: var(--highlight); 
            color: var(--white); 
            text-decoration: none; 
            border-radius: 8px; 
            font-weight: 600;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .btn:hover {
            background: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>Massege failed to sent</h1>
        <p>"Message sending is disabled. This is a <strong>scool project</strong> for demonstration only."</p>
        
        <a href="indexIng.html" class="btn">Get back to home</a>
    </div>

</body>
</html>
